name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling ruff mypy
      - name: Lint with ruff
        run: ruff check src/maximus tests
      - name: Type check with mypy
        run: mypy src/maximus --ignore-missing-imports

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install hatchling pytest pytest-asyncio httpx
          pip install -e .
      - name: Run unit tests
        run: python -m pytest tests/unit -v --tb=short
      - name: Run tool tests
        run: python -m pytest tests/test_all_tools.py -v --tb=short
      - name: Run repo adapter tests
        run: python -m pytest tests/test_repo_adapters.py -v --tb=short
      - name: Run spawner tests
        run: python -m pytest tests/test_spawner.py -v --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install hatchling pytest pytest-asyncio httpx
          pip install -e .
      - name: Run integration tests
        run: python -m pytest tests/test_integration.py tests/integration/ -v --tb=short -m "not integration"

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          cd maximus-terminal
          npm ci
      - name: Lint
        run: |
          cd maximus-terminal
          npm run lint
        continue-on-error: true
      - name: Build
        run: |
          cd maximus-terminal
          npm run build
      - name: Test
        run: |
          cd maximus-terminal
          npm test -- --run
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t maximus-backend -f Dockerfile.backend .
      - name: Build frontend image
        run: docker build -t maximus-frontend -f Dockerfile.frontend .
